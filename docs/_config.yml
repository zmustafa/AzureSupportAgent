title: Azure Support Agent
description: Public documentation for deploying, operating, securing, and extending Azure Support Agent.
url: https://zmustafa.github.io
baseurl: /AzureSupportAgent
repository: zmustafa/AzureSupportAgent

remote_theme: just-the-docs/just-the-docs
color_scheme: azure_support
search_enabled: true
heading_anchors: true
permalink: pretty

aux_links:
  "View on GitHub":
    - https://github.com/zmustafa/AzureSupportAgent
aux_links_new_tab: true

callouts:
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: yellow
  security:
    title: Security
    color: red

back_to_top: true
back_to_top_text: Back to top
footer_content: "Azure Support Agent is open source under the MIT License."
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/social-preview.png

exclude:
  - _build_deck.py
  - _build_journey_slides.py
  - _build_usecases.py
  - _render.py
  - _uc_helpers.py
  - _usecases_build.py
  - _validate.py
  - _journey_render
  - deck-assets
  - improvement-plans
  - test-findings
  - usecase-render
  - ARCHITECTURES_FEATURE.md
  - ARCHITECTURES_TEST_PLAN.md
  - BUG_HUNTING_PLAN.md
  - DATA_RETENTION_PLAN.md
  - GRAPH_TEST_PLAN.md
  - INVENTORY_TEST_PLAN.md
  - UI_TEST_PLAN.md
  - UX_ADVANCED_PLAN.md
  - "*.pptx"
  - "*.xlsx"
  - "~$*"
  - Gemfile
  - Gemfile.lock
