  <g>
    <g transform="translate(166 174)"><circle class="mini" r="30"/><path d="M-13-3h26M-10 10q10 8 20 0" stroke="#BEEBFF" stroke-width="5" stroke-linecap="round" fill="none"/><animateTransform attributeName="transform" type="translate" values="166 174;166 166;166 174" dur="2s" repeatCount="indefinite"/></g>
    <g transform="translate(348 172)"><circle class="mini" r="30"/><path d="M-13-3h26M-10 10q10 8 20 0" stroke="#BEEBFF" stroke-width="5" stroke-linecap="round" fill="none"/><animateTransform attributeName="transform" type="translate" values="348 172;348 164;348 172" dur="2s" begin=".2s" repeatCount="indefinite"/></g>
    <g transform="translate(164 342)"><circle class="mini" r="30"/><path d="M-13-3h26M-10 10q10 8 20 0" stroke="#BEEBFF" stroke-width="5" stroke-linecap="round" fill="none"/><animateTransform attributeName="transform" type="translate" values="164 342;164 350;164 342" dur="2s" begin=".4s" repeatCount="indefinite"/></g>
