  </g>

  <g filter="url(#glow)">
    <circle cx="334" cy="226" r="17" fill="none" stroke="#FFB900" stroke-width="5">
      <animate attributeName="r" values="10;25;10" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;.25;1" dur="1.7s" repeatCount="indefinite"/>
