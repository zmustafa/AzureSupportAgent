  <path class="link" d="M348 342C314 304 292 284 256 256"><animate attributeName="stroke-dashoffset" from="0" to="-48" dur="1.25s" begin=".45s" repeatCount="indefinite"/></path>

  <g transform="translate(256 256)" filter="url(#glow)">
    <rect x="-54" y="-38" width="108" height="76" rx="20" fill="#0078D4" stroke="#D7F7FF" stroke-width="5"/>
    <path d="M-28 0h56M-10-18h20M-16 18h32" stroke="#EAFBFF" stroke-width="8" stroke-linecap="round"/>
    <circle cx="54" cy="-38" r="15" fill="#F7630C" stroke="#FFE1D6" stroke-width="3">
      <animate attributeName="fill" values="#F7630C;#F7630C;#2BCB75;#2BCB75;#F7630C" keyTimes="0;.45;.61;.82;1" dur="3.4s" repeatCount="indefinite"/>
