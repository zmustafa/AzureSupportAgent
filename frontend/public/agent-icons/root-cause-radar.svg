<?xml version="1.0" encoding="UTF-8"?>
<!-- Animated SVG icon for Azure Support Agent. Looping vector animation; transparent background. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Root Cause Radar Icon</title>
  <desc id="desc">A radar sweep scans Azure resources while AI agent nodes coordinate and lock onto a root cause.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0" stop-color="#003A63" stop-opacity=".24"/><stop offset="1" stop-color="#001B2E" stop-opacity="0"/></radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#50E6FF" stop-opacity=".86"/><stop offset="1" stop-color="#50E6FF" stop-opacity="0"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style><![CDATA[
      .ring{fill:none;stroke:#50E6FF;stroke-width:3;opacity:.22}
      .axis{stroke:#50E6FF;stroke-width:2;opacity:.16}
      .link{stroke:#8BE9FF;stroke-width:4;stroke-linecap:round;stroke-dasharray:8 16;filter:url(#glow)}
      .mini{fill:#003A63;stroke:#8BE9FF;stroke-width:4;filter:url(#glow)}
      .resource{fill:#092A46;stroke:#8BE9FF;stroke-width:4;filter:url(#glow)}
    ]]></style>
  </defs>
  <circle cx="256" cy="256" r="220" fill="url(#bg)"/>
  <circle class="ring" cx="256" cy="256" r="72"/>
  <circle class="ring" cx="256" cy="256" r="126"/>
  <circle class="ring" cx="256" cy="256" r="178"/>
