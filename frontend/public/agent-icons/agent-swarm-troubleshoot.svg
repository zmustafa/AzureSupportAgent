<?xml version="1.0" encoding="UTF-8"?>
<!-- Animated SVG icon for Azure Support Agent. Looping vector animation; transparent background. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Agent Swarm Troubleshooting Icon</title>
  <desc id="desc">Multiple AI agents send diagnostic signals to a central cloud and converge on a root cause.</desc>
  <defs>
    <linearGradient id="cloudGrad" x1="95" y1="135" x2="410" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#50E6FF"/>
      <stop offset="0.55" stop-color="#0078D4"/>
      <stop offset="1" stop-color="#243A5E"/>
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#EAFBFF"/>
      <stop offset="0.5" stop-color="#50E6FF"/>
      <stop offset="1" stop-color="#0078D4"/>
    </radialGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="p1" d="M122 145 C180 180 205 220 238 250"/>
    <path id="p2" d="M390 145 C332 180 305 220 274 250"/>
    <path id="p3" d="M116 366 C178 334 205 300 237 266"/>
    <path id="p4" d="M396 366 C334 334 305 300 275 266"/>
    <style><![CDATA[
      .signal{fill:none;stroke:#50E6FF;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 18;filter:url(#glow)}
      .node{fill:url(#nodeGrad);stroke:#C3F6FF;stroke-width:4;filter:url(#glow)}
      .face{stroke:#002B4E;stroke-width:5;stroke-linecap:round;fill:none}
      .label{font-family:Segoe UI,Arial,sans-serif;font-weight:700;fill:#EAFBFF;font-size:34px}
    ]]></style>
  </defs>

  <circle cx="256" cy="256" r="170" fill="#001B2E" opacity="0.10"/>
  <circle cx="256" cy="256" r="132" fill="none" stroke="#50E6FF" stroke-width="2" opacity="0.18"/>
  <circle cx="256" cy="256" r="96" fill="none" stroke="#50E6FF" stroke-width="2" opacity="0.14"/>

  <use href="#p1" class="signal"><animate attributeName="stroke-dashoffset" from="0" to="-60" dur="1.2s" repeatCount="indefinite"/></use>
  <use href="#p2" class="signal"><animate attributeName="stroke-dashoffset" from="0" to="-60" dur="1.2s" begin=".18s" repeatCount="indefinite"/></use>
  <use href="#p3" class="signal"><animate attributeName="stroke-dashoffset" from="0" to="-60" dur="1.2s" begin=".36s" repeatCount="indefinite"/></use>
  <use href="#p4" class="signal"><animate attributeName="stroke-dashoffset" from="0" to="-60" dur="1.2s" begin=".54s" repeatCount="indefinite"/></use>

  <g filter="url(#glow)">
    <circle cx="256" cy="262" r="62" fill="#003A63" opacity="0.18">
      <animate attributeName="r" values="62;82;62" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.03;0.22" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M166 275c-24 0-44-18-44-40 0-20 16-37 37-40 10-31 40-54 76-54 39 0 72 27 79 63 34 3 60 29 60 62 0 35-30 63-67 63H174c-4 0-8-1-8-1z" fill="url(#cloudGrad)" stroke="#BEEBFF" stroke-width="5"/>
    <path d="M190 277h132" stroke="#D7F7FF" stroke-width="9" stroke-linecap="round" opacity="0.84"/>
    <path d="M214 248h84" stroke="#D7F7FF" stroke-width="9" stroke-linecap="round" opacity="0.66"/>
    <path d="M230 304h52" stroke="#D7F7FF" stroke-width="9" stroke-linecap="round" opacity="0.52"/>
  </g>

  <g>
    <circle cx="310" cy="199" r="18" fill="#F7630C" stroke="#FFE1D6" stroke-width="4" filter="url(#glow)">
      <animate attributeName="fill" values="#F7630C;#F7630C;#2BCB75;#2BCB75;#F7630C" keyTimes="0;.35;.55;.82;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <path d="M302 199l6 6 13-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.42;.55;.82;1" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <path d="M310 188v15" stroke="#fff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;.35;.55;.82;1" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <circle cx="310" cy="210" r="2.6" fill="#fff">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;.35;.55;.82;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle r="6" fill="#BEEBFF" filter="url(#glow)"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
    <circle r="6" fill="#BEEBFF" filter="url(#glow)"><animateMotion dur="1.7s" begin=".2s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
    <circle r="6" fill="#BEEBFF" filter="url(#glow)"><animateMotion dur="1.8s" begin=".4s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
    <circle r="6" fill="#BEEBFF" filter="url(#glow)"><animateMotion dur="1.8s" begin=".6s" repeatCount="indefinite"><mpath href="#p4"/></animateMotion></circle>
  </g>

  <g transform="translate(122 145)">
    <circle class="node" r="39"/>
    <rect x="-22" y="-12" width="44" height="27" rx="10" fill="#BEEBFF" opacity=".85"/>
    <path class="face" d="M-11 0h.1M11 0h.1M-10 12q10 8 20 0"/>
    <animateTransform attributeName="transform" type="translate" values="122 145;122 137;122 145" dur="2.2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(390 145)">
    <circle class="node" r="39"/>
    <rect x="-22" y="-12" width="44" height="27" rx="10" fill="#BEEBFF" opacity=".85"/>
    <path class="face" d="M-11 0h.1M11 0h.1M-10 12q10 8 20 0"/>
    <animateTransform attributeName="transform" type="translate" values="390 145;390 137;390 145" dur="2.1s" begin=".2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(116 366)">
    <circle class="node" r="39"/>
    <rect x="-22" y="-12" width="44" height="27" rx="10" fill="#BEEBFF" opacity=".85"/>
    <path class="face" d="M-11 0h.1M11 0h.1M-10 12q10 8 20 0"/>
    <animateTransform attributeName="transform" type="translate" values="116 366;116 374;116 366" dur="2.2s" begin=".3s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(396 366)">
    <circle class="node" r="39"/>
    <rect x="-22" y="-12" width="44" height="27" rx="10" fill="#BEEBFF" opacity=".85"/>
    <path class="face" d="M-11 0h.1M11 0h.1M-10 12q10 8 20 0"/>
    <animateTransform attributeName="transform" type="translate" values="396 366;396 374;396 366" dur="2.1s" begin=".5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(256 256)" opacity=".92">
    <circle r="104" fill="none" stroke="#FFB900" stroke-width="4" stroke-linecap="round" stroke-dasharray="54 600" filter="url(#glow)"/>
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>
